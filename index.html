<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Küche">
<title>Küche</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--cream:#FAF7F2;--warm:#FFF8F0;--tc:#C8603A;--sage:#7A9E7E;--dark:#2D2D2D;--gray:#888;--lgray:#E8E4DF;--border:#DDD8D0;--sh:0 2px 14px rgba(0,0,0,0.08);--r:14px;--rs:10px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--cream);color:var(--dark);min-height:100vh;max-width:430px;margin:0 auto;}
.hdr{background:var(--warm);padding:52px 20px 14px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.hdr h1{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;letter-spacing:-.5px;}
.hdr-sub{font-size:12px;color:var(--gray);margin-top:2px;}
.content{padding:14px 14px 88px;}
.nav{display:flex;background:var(--warm);border-top:1px solid var(--border);position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:100;padding-bottom:env(safe-area-inset-bottom,6px);}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 4px 6px;background:none;border:none;cursor:pointer;font-family:inherit;font-size:10px;color:var(--gray);}
.nb.on{color:var(--tc);}
.nb .ic{font-size:21px;line-height:1;}
.fab{position:fixed;bottom:76px;right:16px;width:50px;height:50px;background:var(--tc);border:none;border-radius:50%;color:white;font-size:24px;cursor:pointer;box-shadow:0 4px 14px rgba(200,96,58,.4);z-index:50;display:flex;align-items:center;justify-content:center;}
/* WEEK */
.wnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.wlbl{font-family:'Playfair Display',serif;font-size:14px;font-weight:600;text-align:center;flex:1;}
.warr{background:none;border:1px solid var(--border);border-radius:8px;width:33px;height:33px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;}
.card{background:white;border-radius:var(--r);margin-bottom:10px;overflow:hidden;box-shadow:var(--sh);}
.ch{display:flex;justify-content:space-between;align-items:center;padding:11px 15px;border-bottom:1px solid var(--lgray);}
.cb{padding:11px 15px;}
.mr{display:flex;align-items:center;gap:10px;margin-bottom:7px;}
.mr:last-child{margin-bottom:0;}
.mt{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#999;width:55px;flex-shrink:0;}
.mn{flex:1;font-size:14px;}
.me{flex:1;font-size:13px;color:#bbb;font-style:italic;}
.abtn{background:none;border:1px dashed var(--border);border-radius:6px;width:27px;height:27px;cursor:pointer;font-size:16px;color:#aaa;flex-shrink:0;}
.rbtn{background:none;border:none;cursor:pointer;color:#ccc;font-size:13px;}
/* SHOP */
.sacts{display:flex;gap:8px;margin-bottom:13px;}
.bp{background:var(--tc);color:white;border:none;border-radius:var(--rs);padding:10px 15px;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;flex:1;}
.bs{background:white;color:var(--dark);border:1px solid var(--border);border-radius:var(--rs);padding:10px 13px;font-family:inherit;font-size:13px;cursor:pointer;}
.scat{margin-bottom:16px;}
.sct{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:#999;margin-bottom:7px;padding-left:2px;}
.si{background:white;border-radius:var(--rs);padding:11px 13px;margin-bottom:5px;display:flex;align-items:center;gap:11px;box-shadow:var(--sh);}
.si.ck{opacity:.4;}
.scb{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:11px;color:white;}
.si.ck .scb{background:var(--sage);border-color:var(--sage);}
.si.ck .sn{text-decoration:line-through;}
.sn{flex:1;font-size:15px;}
.sa{font-size:13px;color:#999;}
.delbtn{background:none;border:none;cursor:pointer;color:#ccc;font-size:15px;}
/* RECIPES */
.rc{background:white;border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:11px;}
.re{font-size:46px;text-align:center;padding:18px 0 12px;background:var(--cream);}
.ri{padding:12px 15px;}
.rt{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;margin-bottom:4px;}
.rm{display:flex;gap:12px;font-size:12px;color:#999;margin-bottom:8px;}
.tag{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500;display:inline-block;margin:2px 2px 2px 0;}
.tv{background:#E8F5E9;color:#4CAF50;}.tq{background:#FFF3E0;color:#FF9800;}.tf{background:#FCE4EC;color:#E91E63;}.tg{background:#EEE;color:#666;}
.ract{display:flex;gap:7px;padding:8px 15px 13px;}
.bsm{font-size:12px;padding:6px 11px;border-radius:8px;border:1px solid var(--border);background:white;cursor:pointer;font-family:inherit;}
/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.modal{background:white;border-radius:22px 22px 0 0;width:100%;max-width:430px;padding:18px 18px 36px;max-height:90vh;overflow-y:auto;animation:su .25s ease;}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;}
.mtitle{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;}
.mcls{background:#EEE;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:14px;}
.fg{margin-bottom:13px;}
.lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#999;display:block;margin-bottom:5px;}
.inp{width:100%;padding:10px 13px;border:1px solid var(--border);border-radius:var(--rs);font-family:inherit;font-size:15px;outline:none;}
.inp:focus{border-color:var(--tc);}
.ta{width:100%;padding:10px 13px;border:1px solid var(--border);border-radius:var(--rs);font-family:inherit;font-size:14px;outline:none;min-height:80px;resize:vertical;}
.sel{width:100%;padding:10px 13px;border:1px solid var(--border);border-radius:var(--rs);font-family:inherit;font-size:14px;outline:none;background:white;}
.frow{display:flex;gap:10px;}
.frow .fg{flex:1;}
.irw{display:flex;gap:8px;margin-bottom:6px;align-items:center;}
.ibtn{width:35px;height:35px;border-radius:8px;border:1px solid var(--border);background:white;cursor:pointer;font-size:16px;flex-shrink:0;}
.topt{padding:6px 13px;border-radius:20px;border:1px solid var(--border);font-size:13px;cursor:pointer;background:white;font-family:inherit;margin:3px 3px 3px 0;}
.topt.sel{background:var(--tc);color:white;border-color:var(--tc);}
.rsl{max-height:42vh;overflow-y:auto;}
.rsi{padding:11px 13px;border-radius:var(--rs);border:1px solid var(--border);margin-bottom:7px;cursor:pointer;display:flex;align-items:center;gap:10px;background:white;}
.chip{display:inline-flex;align-items:center;gap:3px;background:var(--cream);border-radius:20px;padding:4px 10px;font-size:13px;margin:2px;}
.empty{text-align:center;padding:42px 20px;color:#999;}
.empty .ei{font-size:44px;margin-bottom:10px;}
.hist{background:white;border-radius:var(--r);padding:13px 15px;margin-bottom:10px;box-shadow:var(--sh);}
.hidden{display:none!important;}
</style>
</head>
<body>
<div class="hdr"><h1>🍽️ Küche</h1><div class="hdr-sub" id="hsub">Diese Woche</div></div>
<div class="content" id="main"></div>
<nav class="nav">
  <button class="nb on" id="nb-plan" onclick="go('plan')"><span class="ic">📅</span>Wochenplan</button>
  <button class="nb" id="nb-shop" onclick="go('shop')"><span class="ic">🛒</span>Einkauf</button>
  <button class="nb" id="nb-recipes" onclick="go('recipes')"><span class="ic">📖</span>Rezepte</button>
  <button class="nb" id="nb-history" onclick="go('history')"><span class="ic">📊</span>Verlauf</button>
</nav>
<button class="fab" id="fab" onclick="fabClick()">+</button>
<div class="ov hidden" id="ov" onclick="closeModal(event)"><div class="modal" id="mc" onclick="event.stopPropagation()"></div></div>

<script>
const DAYS=["Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag","Sonntag"];
const MTS=[{k:"mittag",l:"Mittag"},{k:"abend",l:"Abend"}];
const CATS=["Obst & Gemüse","Milchprodukte","Fleisch & Fisch","Backwaren","Zutaten","Sonstiges"];
const TAGS=["schnell","vegetarisch","vegan","aufwändig"];
const TAGCLS={vegetarisch:"tv",schnell:"tq",fav:"tf"};

let S = JSON.parse(localStorage.getItem("kueche")||"null") || {
  recipes:[
    {id:1,emoji:"🍝",name:"Spaghetti Carbonara",time:25,servings:2,tags:["schnell"],ingredients:[{name:"Spaghetti",amount:"200g"},{name:"Pancetta",amount:"100g"},{name:"Eier",amount:"2"},{name:"Parmesan",amount:"60g"}],steps:"1. Pasta kochen\n2. Pancetta anbraten\n3. Eier mit Parmesan verrühren\n4. Pasta abgießen, Ei-Mischung unterrühren",lastCooked:null,favorite:false},
    {id:2,emoji:"🥗",name:"Griechischer Salat",time:15,servings:2,tags:["schnell","vegetarisch"],ingredients:[{name:"Tomaten",amount:"3"},{name:"Gurke",amount:"1"},{name:"Feta",amount:"150g"},{name:"Oliven",amount:"50g"}],steps:"1. Gemüse würfeln\n2. Feta dazu\n3. Mit Olivenöl und Oregano anmachen",lastCooked:null,favorite:true},
    {id:3,emoji:"🍲",name:"Linsensuppe",time:45,servings:4,tags:["vegetarisch"],ingredients:[{name:"Rote Linsen",amount:"250g"},{name:"Karotten",amount:"2"},{name:"Zwiebel",amount:"1"},{name:"Kreuzkümmel",amount:"1 TL"}],steps:"1. Zwiebeln anschwitzen\n2. Karotten dazu\n3. Linsen und Brühe hinzufügen\n4. 30 min köcheln",lastCooked:null,favorite:false},
  ],
  weekPlans:{},shoppingList:[],weekOffset:0
};
let tab="plan";
function save(){localStorage.setItem("kueche",JSON.stringify(S));}

function wkStart(o=0){const d=new Date();const day=d.getDay();d.setDate(d.getDate()-day+(day===0?-6:1)+o*7);d.setHours(0,0,0,0);return d;}
function wkDays(o=0){const s=wkStart(o);return DAYS.map((name,i)=>{const d=new Date(s);d.setDate(s.getDate()+i);return{name,date:d,key:d.toISOString().split("T")[0]};});}
function wkLbl(o){const d=wkDays(o);const f=x=>`${x.getDate()}.${x.getMonth()+1}.`;if(o===0)return`Diese Woche (${f(d[0].date)}–${f(d[6].date)})`;if(o===-1)return"Letzte Woche";if(o===1)return"Nächste Woche";return`${f(d[0].date)}–${f(d[6].date)}`;}

function go(t){tab=t;document.querySelectorAll(".nb").forEach(b=>b.classList.remove("on"));document.getElementById("nb-"+t).classList.add("on");document.getElementById("hsub").textContent={plan:wkLbl(S.weekOffset),shop:"Einkaufsliste",recipes:"Meine Rezepte",history:"Vergangene Wochen"}[t];document.getElementById("fab").classList.toggle("hidden",t==="history");render();}

function render(){
  const c=document.getElementById("main");
  if(tab==="plan")c.innerHTML=renderPlan();
  else if(tab==="shop")c.innerHTML=renderShop();
  else if(tab==="recipes")c.innerHTML=renderRecipes();
  else c.innerHTML=renderHistory();
}

function renderPlan(){
  const days=wkDays(S.weekOffset);const plan=S.weekPlans[S.weekOffset]||{};
  let h=`<div class="wnav"><button class="warr" onclick="chWk(-1)">←</button><span class="wlbl">${wkLbl(S.weekOffset)}</span><button class="warr" onclick="chWk(1)">→</button></div>`;
  days.forEach(day=>{
    const dp=plan[day.key]||{};
    h+=`<div class="card"><div class="ch"><span style="font-weight:500;font-size:14px">${day.name}</span><span style="font-size:12px;color:#999">${day.date.getDate()}.${day.date.getMonth()+1}.</span></div><div class="cb">`;
    MTS.forEach(mt=>{
      const m=dp[mt.k];
      if(m)h+=`<div class="mr"><span class="mt">${mt.l}</span><span class="mn">${m.emoji||""} ${m.name}</span><button class="rbtn" onclick="rmMeal('${day.key}','${mt.k}')">✕</button></div>`;
      else h+=`<div class="mr"><span class="mt">${mt.l}</span><span class="me">noch nichts geplant</span><button class="abtn" onclick="pickMeal('${day.key}','${mt.k}','${day.name}','${mt.l}')">+</button></div>`;
    });
    h+=`</div></div>`;
  });
  return h;
}
function chWk(d){S.weekOffset+=d;save();go("plan");}
function rmMeal(dk,mt){const p=S.weekPlans[S.weekOffset]||{};if(p[dk])delete p[dk][mt];S.weekPlans[S.weekOffset]=p;save();render();}
function setMeal(dk,mt,meal){if(!S.weekPlans[S.weekOffset])S.weekPlans[S.weekOffset]={};if(!S.weekPlans[S.weekOffset][dk])S.weekPlans[S.weekOffset][dk]={};S.weekPlans[S.weekOffset][dk][mt]=meal;save();closeModal();render();}

function renderShop(){
  const cat={};S.shoppingList.forEach(i=>{const c=i.category||"Sonstiges";if(!cat[c])cat[c]=[];cat[c].push(i);});
  const order=["Obst & Gemüse","Milchprodukte","Fleisch & Fisch","Backwaren","Zutaten","Sonstiges"];
  let h=`<div class="sacts"><button class="bp" onclick="openAddShop()">+ Artikel hinzufügen</button><button class="bs" onclick="clearChk()">Abgehakte löschen</button></div>`;
  if(!S.shoppingList.length)return h+`<div class="empty"><div class="ei">🛒</div><p style="font-size:14px;line-height:1.6">Die Liste ist leer.<br>Weise Rezepte im Wochenplan zu,<br>um Zutaten automatisch hinzuzufügen.</p></div>`;
  Object.keys(cat).sort((a,b)=>(order.indexOf(a)<0?99:order.indexOf(a))-(order.indexOf(b)<0?99:order.indexOf(b))).forEach(c=>{
    h+=`<div class="scat"><div class="sct">${c}</div>`;
    cat[c].forEach(i=>{h+=`<div class="si ${i.checked?"ck":""}" id="si-${i.id}"><div class="scb" onclick="tglShop(${i.id})">${i.checked?"✓":""}</div><span class="sn">${i.name}</span>${i.amount?`<span class="sa">${i.amount}</span>`:""}<button class="delbtn" onclick="delShop(${i.id})">🗑</button></div>`;});
    h+=`</div>`;
  });
  return h;
}
function tglShop(id){const i=S.shoppingList.find(x=>x.id===id);if(i){i.checked=!i.checked;save();render();}}
function delShop(id){S.shoppingList=S.shoppingList.filter(x=>x.id!==id);save();render();}
function clearChk(){S.shoppingList=S.shoppingList.filter(i=>!i.checked);save();render();}

function renderRecipes(){
  if(!S.recipes.length)return`<div class="empty"><div class="ei">📖</div><p style="font-size:14px">Noch keine Rezepte.<br>Tippe auf + um eines hinzuzufügen.</p></div>`;
  let h="";
  S.recipes.forEach(r=>{
    const tags=(r.tags||[]).map(t=>`<span class="tag ${TAGCLS[t]||"tg"}">${t}</span>`).join("")+(r.favorite?'<span class="tag tf">♥</span>':"");
    h+=`<div class="rc"><div class="re">${r.emoji}</div><div class="ri"><div class="rt">${r.name}</div><div class="rm"><span>⏱ ${r.time} min</span><span>👤 ${r.servings} Pers.</span>${r.lastCooked?`<span>Zuletzt: ${new Date(r.lastCooked).toLocaleDateString("de")}</span>`:""}</div><div>${tags}</div></div><div class="ract"><button class="bsm" onclick="viewRecipe(${r.id})">📖 Ansehen</button><button class="bsm" onclick="editRecipe(${r.id})">✏️ Bearbeiten</button><button class="bsm" style="color:#e57373" onclick="delRecipe(${r.id})">🗑 Löschen</button></div></div>`;
  });
  return h;
}
function delRecipe(id){if(!confirm("Rezept wirklich löschen?"))return;S.recipes=S.recipes.filter(r=>r.id!==id);save();render();}

function renderHistory(){
  const past=Object.keys(S.weekPlans).map(Number).sort((a,b)=>b-a).filter(k=>k<=0);
  if(!past.length)return`<div class="empty"><div class="ei">📊</div><p style="font-size:14px">Noch kein Verlauf vorhanden.<br>Erstelle Essenspläne,<br>um sie hier zu sehen.</p></div>`;
  let h="";
  past.forEach(o=>{
    const days=wkDays(o);const plan=S.weekPlans[o]||{};const meals=[];
    days.forEach(day=>{const dp=plan[day.key]||{};MTS.forEach(mt=>{if(dp[mt.k])meals.push({day:day.name,type:mt.l,meal:dp[mt.k]});});});
    if(!meals.length)return;
    h+=`<div class="hist"><div style="font-size:12px;color:#999;margin-bottom:7px;font-weight:600">${wkLbl(o)}</div>`;
    meals.forEach(m=>{h+=`<div style="font-size:13px;margin-bottom:3px"><span style="font-size:11px;color:#aaa">${m.day} ${m.type}: </span>${m.meal.emoji||""} ${m.meal.name}</div>`;});
    h+=`</div>`;
  });
  return h||`<div class="empty"><div class="ei">📊</div><p>Keine Daten.</p></div>`;
}

// ── MODAL HELPERS ──
function showModal(html){document.getElementById("mc").innerHTML=html;document.getElementById("ov").classList.remove("hidden");}
function closeModal(e){if(e&&e.target!==document.getElementById("ov"))return;document.getElementById("ov").classList.add("hidden");}
function mhdr(title){return`<div class="mhdr"><span class="mtitle">${title}</span><button class="mcls" onclick="document.getElementById('ov').classList.add('hidden')">✕</button></div>`;}

// ── MEAL PICKER ──
function pickMeal(dk,mt,dayName,mtLabel){
  let h=mhdr(`${dayName} · ${mtLabel}`)+`<div class="rsl">`;
  if(!S.recipes.length)h+=`<div class="empty"><div class="ei">📖</div><p>Noch keine Rezepte.</p></div>`;
  else S.recipes.forEach(r=>{h+=`<div class="rsi" onclick="assignMeal('${dk}','${mt}',${r.id})"><span style="font-size:24px">${r.emoji}</span><div><div style="font-size:15px;font-weight:500">${r.name}</div><div style="font-size:11px;color:#aaa">⏱ ${r.time} min · ${r.servings} Pers.</div></div></div>`;});
  h+=`</div><button class="bp" style="margin-top:11px" onclick="manualMeal('${dk}','${mt}')">+ Freitext eingeben</button>`;
  showModal(h);
}
function assignMeal(dk,mt,rid){
  const r=S.recipes.find(x=>x.id===rid);if(!r)return;
  r.lastCooked=new Date().toISOString();
  (r.ingredients||[]).forEach(ing=>{if(!S.shoppingList.find(x=>x.name.toLowerCase()===ing.name.toLowerCase()))S.shoppingList.push({id:Date.now()+Math.random(),name:ing.name,amount:ing.amount,checked:false,category:"Zutaten"});});
  setMeal(dk,mt,{name:r.name,emoji:r.emoji,recipeId:r.id});
}
function manualMeal(dk,mt){
  showModal(mhdr("Mahlzeit eintragen")+`<div class="fg"><label class="lbl">Gericht</label><input class="inp" id="mmn" placeholder="z.B. Reste vom Vortag"></div><button class="bp" onclick="saveManual('${dk}','${mt}')">Speichern</button>`);
  setTimeout(()=>document.getElementById("mmn")?.focus(),100);
}
function saveManual(dk,mt){const n=document.getElementById("mmn").value.trim();if(!n)return;setMeal(dk,mt,{name:n,emoji:"🍽️"});}

// ── ADD SHOP ITEM ──
function openAddShop(){
  showModal(mhdr("Artikel hinzufügen")+`<div class="fg"><label class="lbl">Artikel</label><input class="inp" id="shn" placeholder="z.B. Tomaten"></div><div class="frow"><div class="fg"><label class="lbl">Menge</label><input class="inp" id="sha" placeholder="500g"></div><div class="fg"><label class="lbl">Kategorie</label><select class="sel" id="shc">${CATS.map(c=>`<option>${c}</option>`).join("")}</select></div></div><button class="bp" onclick="saveShop()">Hinzufügen</button>`);
  setTimeout(()=>document.getElementById("shn")?.focus(),100);
}
function saveShop(){const n=document.getElementById("shn").value.trim();if(!n)return;S.shoppingList.push({id:Date.now(),name:n,amount:document.getElementById("sha").value.trim(),category:document.getElementById("shc").value,checked:false});save();document.getElementById("ov").classList.add("hidden");render();}

// ── VIEW RECIPE ──
function viewRecipe(id){
  const r=S.recipes.find(x=>x.id===id);if(!r)return;
  const ings=(r.ingredients||[]).map(i=>`<span class="chip">${i.name}${i.amount?` <strong>${i.amount}</strong>`:""}</span>`).join("");
  showModal(`${mhdr("")}<div style="font-size:44px;text-align:center;margin-bottom:8px">${r.emoji}</div><div style="font-family:'Playfair Display',serif;font-size:20px;font-weight:700;text-align:center;margin-bottom:6px">${r.name}</div><div style="display:flex;gap:14px;justify-content:center;font-size:13px;color:#aaa;margin-bottom:14px"><span>⏱ ${r.time} min</span><span>👤 ${r.servings} Pers.</span></div>${ings?`<div style="margin-bottom:13px"><div class="sct">Zutaten</div><div>${ings}</div></div>`:""}${r.steps?`<div><div class="sct">Zubereitung</div><div style="font-size:14px;line-height:1.7;white-space:pre-wrap">${r.steps}</div></div>`:""}<button class="bp" style="margin-top:16px" onclick="tglFav(${r.id})">${r.favorite?"♥ Aus Favoriten entfernen":"♡ Als Favorit markieren"}</button>`);
}
function tglFav(id){const r=S.recipes.find(x=>x.id===id);if(r){r.favorite=!r.favorite;save();document.getElementById("ov").classList.add("hidden");render();}}

// ── RECIPE FORM ──
let _fi=[]; // temp ingredients
function editRecipe(id){openForm(S.recipes.find(r=>r.id===id));}
function openForm(r){
  _fi=r?.ingredients?.length?r.ingredients.map(i=>({...i})):[{name:"",amount:""}];
  const tsel=TAGS.map(t=>`<button class="topt ${(r?.tags||[]).includes(t)?"sel":""}" onclick="this.classList.toggle('sel')">${t}</button>`).join("");
  const irows=_fi.map((ing,i)=>ingRow(i,ing.name,ing.amount||"")).join("");
  showModal(`${mhdr(r?"Bearbeiten":"Neues Rezept")}<div class="frow"><div class="fg" style="flex:0 0 65px"><label class="lbl">Emoji</label><input class="inp" id="rEmoji" value="${r?.emoji||"🍽️"}" maxlength="4" style="text-align:center"></div><div class="fg"><label class="lbl">Name</label><input class="inp" id="rName" value="${r?.name||""}" placeholder="Rezeptname"></div></div><div class="frow"><div class="fg"><label class="lbl">Zeit (min)</label><input class="inp" type="number" id="rTime" value="${r?.time||30}"></div><div class="fg"><label class="lbl">Personen</label><input class="inp" type="number" id="rServ" value="${r?.servings||2}"></div></div><div class="fg"><label class="lbl">Tags</label><div id="tagsel">${tsel}</div></div><div class="fg"><label class="lbl">Zutaten</label><div id="ilist">${irows}</div><button class="bs" style="width:100%;margin-top:3px" onclick="addIngRow()">+ Zutat</button></div><div class="fg"><label class="lbl">Zubereitung</label><textarea class="ta" id="rSteps">${r?.steps||""}</textarea></div><button class="bp" onclick="saveRecipe(${r?.id||"null"})">Speichern</button>`);
}
function ingRow(i,name,amount){return`<div class="irw" id="ir${i}"><input class="inp" style="flex:1" placeholder="Zutat" value="${name}" oninput="_fi[${i}]?_fi[${i}].name=this.value:null"><input class="inp" style="width:75px;flex:0 0 75px" placeholder="Menge" value="${amount}" oninput="_fi[${i}]?_fi[${i}].amount=this.value:null"><button class="ibtn" onclick="rmIngRow(${i})">–</button></div>`;}
function addIngRow(){const i=_fi.length;_fi.push({name:"",amount:""});const d=document.createElement("div");d.className="irw";d.id="ir"+i;d.innerHTML=`<input class="inp" style="flex:1" placeholder="Zutat" oninput="_fi[${i}]?_fi[${i}].name=this.value:null"><input class="inp" style="width:75px;flex:0 0 75px" placeholder="Menge" oninput="_fi[${i}]?_fi[${i}].amount=this.value:null"><button class="ibtn" onclick="rmIngRow(${i})">–</button>`;document.getElementById("ilist").appendChild(d);}
function rmIngRow(i){const el=document.getElementById("ir"+i);if(el)el.remove();_fi[i]=null;}
function saveRecipe(id){
  const name=document.getElementById("rName").value.trim();if(!name){alert("Bitte Namen eingeben.");return;}
  const tags=[...document.querySelectorAll("#tagsel .topt.sel")].map(b=>b.textContent);
  const ings=_fi.filter(i=>i&&i.name.trim());
  const rec={id:id||Date.now(),emoji:document.getElementById("rEmoji").value||"🍽️",name,time:parseInt(document.getElementById("rTime").value)||30,servings:parseInt(document.getElementById("rServ").value)||2,tags,ingredients:ings,steps:document.getElementById("rSteps").value,lastCooked:id?S.recipes.find(r=>r.id===id)?.lastCooked:null,favorite:id?S.recipes.find(r=>r.id===id)?.favorite||false:false};
  if(id){const idx=S.recipes.findIndex(r=>r.id===id);if(idx!==-1)S.recipes[idx]=rec;}else S.recipes.push(rec);
  save();document.getElementById("ov").classList.add("hidden");render();
}

function fabClick(){if(tab==="shop")openAddShop();else if(tab==="recipes")openForm(null);}

go("plan");
</script>
</body>
